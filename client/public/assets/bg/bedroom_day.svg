<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6d3"/>
      <stop offset="100%" stop-color="#e8d5c0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a882"/>
      <stop offset="100%" stop-color="#b89972"/>
    </linearGradient>
  </defs>
  <!-- Wall -->
  <rect width="960" height="380" fill="url(#wall)"/>
  <!-- Floor -->
  <rect y="380" width="960" height="160" fill="url(#floor)"/>
  <!-- Window -->
  <rect x="640" y="60" width="240" height="200" rx="4" fill="#87ceeb" stroke="#b89972" stroke-width="4"/>
  <line x1="760" y1="60" x2="760" y2="260" stroke="#b89972" stroke-width="3"/>
  <line x1="640" y1="160" x2="880" y2="160" stroke="#b89972" stroke-width="3"/>
  <!-- Sunlight -->
  <rect x="640" y="60" width="240" height="200" fill="#ffe4b5" opacity="0.2"/>
  <!-- Bed -->
  <rect x="80" y="260" width="240" height="100" rx="6" fill="#deb887"/>
  <rect x="90" y="270" width="220" height="70" rx="4" fill="#faf0e6"/>
  <!-- Pillow -->
  <rect x="280" y="270" width="40" height="60" rx="8" fill="#fff8dc"/>
  <!-- Desk -->
  <rect x="400" y="280" width="180" height="12" rx="2" fill="#8b7355"/>
  <rect x="420" y="292" width="14" height="100" fill="#8b7355"/>
  <rect x="546" y="292" width="14" height="100" fill="#8b7355"/>
  <!-- Poster on wall -->
  <rect x="180" y="120" width="100" height="120" rx="2" fill="#fff" opacity="0.15"/>
</svg>