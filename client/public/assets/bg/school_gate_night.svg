<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="60%" stop-color="#152030"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="120" cy="50" r="1.5" fill="#8ab4f8" opacity="0.6"/>
  <circle cx="350" cy="30" r="1" fill="#8ab4f8" opacity="0.4"/>
  <circle cx="580" cy="60" r="1.5" fill="#8ab4f8" opacity="0.5"/>
  <circle cx="750" cy="40" r="1" fill="#8ab4f8" opacity="0.4"/>
  <circle cx="880" cy="70" r="1.5" fill="#8ab4f8" opacity="0.3"/>
  <circle cx="200" cy="90" r="1" fill="#8ab4f8" opacity="0.3"/>
  <!-- Ground -->
  <rect x="0" y="400" width="960" height="140" fill="#101520"/>
  <!-- Gate -->
  <rect x="380" y="180" width="200" height="220" fill="none" stroke="#2a3a5a" stroke-width="6" rx="2"/>
  <rect x="350" y="180" width="20" height="260" fill="#1a2a4a"/>
  <rect x="590" y="180" width="20" height="260" fill="#1a2a4a"/>
  <text x="480" y="210" text-anchor="middle" fill="#3a5a7a" font-size="20">第一中学</text>
  <line x1="390" y1="230" x2="570" y2="230" stroke="#2a3a5a" stroke-width="1"/>
  <!-- Gate lamp -->
  <circle cx="480" cy="175" r="8" fill="#3a4a6a" opacity="0.6"/>
  <!-- Path -->
  <rect x="440" y="400" width="80" height="140" fill="#151a2a"/>
</svg>