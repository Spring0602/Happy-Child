<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4050"/>
      <stop offset="100%" stop-color="#2a3040"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9944" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff9944" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#room)"/>
  <!-- Windows (evening glow) -->
  <rect x="680" y="40" width="100" height="160" rx="4" fill="#ff6600" opacity="0.2"/>
  <rect x="800" y="40" width="100" height="160" rx="4" fill="#ff6600" opacity="0.15"/>
  <!-- Desks (ordered rows) -->
  <g fill="#4a4a5a" stroke="#5a5a6a" stroke-width="1">
    <rect x="80" y="300" width="120" height="12" rx="2"/>
    <rect x="100" y="312" width="10" height="40"/>
    <rect x="170" y="312" width="10" height="40"/>
    <rect x="250" y="300" width="120" height="12" rx="2"/>
    <rect x="270" y="312" width="10" height="40"/>
    <rect x="340" y="312" width="10" height="40"/>
    <rect x="420" y="300" width="120" height="12" rx="2"/>
    <rect x="440" y="312" width="10" height="40"/>
    <rect x="510" y="312" width="10" height="40"/>
  </g>
  <!-- Second row -->
  <g fill="#4a4a5a" stroke="#5a5a6a" stroke-width="1">
    <rect x="80" y="380" width="120" height="12" rx="2"/>
    <rect x="100" y="392" width="10" height="40"/>
    <rect x="170" y="392" width="10" height="40"/>
    <rect x="250" y="380" width="120" height="12" rx="2"/>
    <rect x="270" y="392" width="10" height="40"/>
    <rect x="340" y="392" width="10" height="40"/>
    <rect x="420" y="380" width="120" height="12" rx="2"/>
    <rect x="440" y="392" width="10" height="40"/>
    <rect x="510" y="392" width="10" height="40"/>
  </g>
  <!-- Blackboard -->
  <rect x="18" y="60" width="360" height="160" rx="2" fill="#1a2030"/>
  <text x="198" y="150" text-anchor="middle" fill="#4a5a3a" font-size="14">黑板 · 板书</text>
  <!-- Ceiling lights -->
  <circle cx="240" cy="20" r="12" fill="#ffcc44" opacity="0.3"/>
  <circle cx="480" cy="20" r="12" fill="#ffcc44" opacity="0.3"/>
  <circle cx="720" cy="20" r="12" fill="#ffcc44" opacity="0.3"/>
</svg>