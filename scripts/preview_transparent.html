<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>教师办公室 - 物品透明化效果对比</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
  h1 { text-align: center; margin-bottom: 8px; font-size: 22px; }
  .note { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; max-width: 1600px; margin: 0 auto; }
  .card { background: #16213e; border-radius: 10px; padding: 14px; border: 1px solid #0f3460; }
  .card h3 { font-size: 13px; margin-bottom: 8px; color: #e94560; }
  .compare { display: flex; gap: 8px; }
  .compare > div { flex: 1; }
  .compare label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; text-align: center; }
  .img-box { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
             border-radius: 6px; overflow: hidden; }
  .checker { background-image:
    linear-gradient(45deg, #333 25%, transparent 25%),
    linear-gradient(-45deg, #333 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #333 75%),
    linear-gradient(-45deg, transparent 75%, #333 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    background-color: #222;
  }
  .orig-bg { background: #000; }
  .img-box img { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
  .stats { font-size: 10px; color: #666; margin-top: 5px; text-align: center; }
  .section-title { text-align: center; color: #e94560; font-size: 16px; margin: 20px 0 10px; border-top: 1px solid #0f3460; padding-top: 16px; }
</style>
</head>
<body>
<h1>教师办公室 - 物品透明化 v2 效果对比</h1>
<p class="note">左: 原始矩形裁剪（黑底） | 右: v2 透明化处理（棋盘格=透明区域）<br>8邻域 flood-fill + 内部封闭背景移除 | 对标客厅物品处理标准</p>
<div class="grid" id="grid"></div>

<script>
const BACKUP = '../../client/public/assets/maps/teacher_office/物品_sprites_backup';
const DONE = '../../client/public/assets/maps/teacher_office/物品_sprites';
const ITEMS = 25;

const stats = {
  1: '2.0%', 2: '12.7%', 3: '17.8%', 4: '46.1%', 5: '54.4%',
  6: '35.2%', 7: '9.4%', 8: '12.9%', 9: '8.2%', 10: '25.8%',
  11: '40.6%', 12: '27.3%', 13: '20.3%', 14: '19.1%', 15: '13.3%',
  16: '16.5%', 17: '17.0%', 18: '27.3%', 19: '16.6%', 20: '29.7%',
  21: '47.3%', 22: '65.6%', 23: '44.5%', 24: '41.8%', 25: '36.8%'
};

const grid = document.getElementById('grid');
for (let i = 1; i <= ITEMS; i++) {
  const num = String(i).padStart(2, '0');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h3>item_${num}.png | transparent: ${stats[i]}</h3>
    <div class="compare">
      <div>
        <label>original (black bg)</label>
        <div class="img-box orig-bg">
          <img src="${BACKUP}/item_${num}.png" alt="orig">
        </div>
      </div>
      <div>
        <label>v2 processed (checker=transparent)</label>
        <div class="img-box checker">
          <img src="${DONE}/item_${num}.png" alt="done">
        </div>
      </div>
    </div>
  `;
  grid.appendChild(card);
}
</script>
</body>
</html>
